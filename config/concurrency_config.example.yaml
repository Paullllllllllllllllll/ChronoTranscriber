# =============================================================================
# Concurrency Configuration (EXAMPLE TEMPLATE)
# =============================================================================
# This file ships as a scrubbed public template. A fresh clone uses it
# automatically if concurrency_config.yaml is absent (the loader logs a notice).
# To customize: copy this file to concurrency_config.yaml and edit it.
#
# Used by:
#   - modules/transcribe/pipeline.py, modules/transcribe/manager.py
#       (concurrency_limit, delay_between_tasks)
#   - modules/batch/, modules/llm/transcriber.py (service_tier, batch_chunk_size)
#   - modules/llm/providers/base.py (retry.* -> tenacity retry authority)
#   - modules/infra/rate_limit.py (concurrency.rate_limits)
#   - modules/infra/token_budget.py (daily_token_limit)
# =============================================================================

concurrency:
  transcription:
    # Maximum concurrent LLM API calls during synchronous transcription.
    # Higher values = faster processing but more API load.
    # Recommended: 16 (tuned for OpenAI API tier 3; also bounds how far
    # in-flight pages can drain past a per-key daily pool cap).
    concurrency_limit: 16

    # Delay (seconds) between starting each transcription task.
    # Helps avoid rate limiting; set to 0 for maximum throughput.
    delay_between_tasks: 0.5

    # OpenAI service tier for Responses API (synchronous mode only).
    # Values: 'auto', 'default', 'flex', 'priority'
    # Note: 'flex' is synchronous-only; batch processing auto-converts to 'auto'.
    # Recommended: flex (cheaper; pair with request_timeout 900).
    service_tier: flex

    # Number of images per batch file when using OpenAI Batch API.
    # Larger chunks = fewer API calls but larger file uploads.
    batch_chunk_size: 20

    # Request timeout in seconds for each API call.
    # OpenAI's default SDK timeout is 10 minutes; flex processing can exceed this.
    # Set to 900 (15 minutes) as recommended by OpenAI for flex service tier.
    # LangChain will raise APITimeoutError and trigger retry on expiry.
    request_timeout: 900

    # Retry configuration for transient API errors (429, 5xx, timeouts).
    # The tenacity loop in modules/llm/providers/base.py is the SINGLE retry
    # authority: every provider builds its SDK client with max_retries=0, so
    # these knobs no longer feed the SDK. Backoff is exponential with jitter,
    # floored near 2 s and capped at 120 s; a server-sent Retry-After header
    # raises the wait to at least that value (still capped at 120 s).
    retry:
      # Maximum transient (429 / 5xx / connection / timeout) retry attempts
      # before failing.
      attempts: 8

      # Maximum retry attempts for validation/parsing errors (model returns
      # unparseable structured output) AND for transient provider response-shape
      # bugs (TypeError/AttributeError from LangChain internals). Shared budget.
      validation_attempts: 1

      # Minimum expected input tokens for image requests. Responses below
      # this are treated as cross-contaminated and retried. 0 = disabled.
      min_input_tokens: 0

      # Content quality validators: detect hallucination loops, truncation,
      # system-prompt bleed, and excessive line repetition in transcribed text.
      # Failed pages are retried against the validation_attempts budget.
      content_quality:
        enabled: false
        # Repeated substring detection (hallucination loops)
        max_repeated_substring_length: 30   # minimum substring length to check
        max_repeated_substring_count: 15    # trigger threshold (real loops show 100+)
        min_alphanum_in_substring: 15       # substring must have >=N alphanumeric chars
                                            # (filters whitespace/punctuation padding)
        max_single_char_repeat: 75          # e.g., "MMMM..." x75
        # Truncation detection
        min_transcription_length: 0         # disabled by default
        # System-prompt bleed detection (checked in first N chars)
        bleed_check_chars: 200
        system_prompt_bleed_patterns:
          - '"type": "object"'
          - '"additionalProperties"'
          - '"transcription_not_possible"'
        # Excessive line repetition (map-label loops)
        max_line_repeat_count: 18
        min_line_length_for_repeat: 10
        # Invalid-transcription-marker detection
        invalid_markers:
          enabled: true
          icon_description_literals:
            - "!icon:"
            - "(icon)"
            - "(no icon"
            - "[see image"
            - "[see attached"
            - "[image of"
            - "[image:"
            - "[figure"
            - "[picture"
            - "(building icon)"
            - "(hotel icon)"
            - "(restaurant icon)"
            - "(fork and spoon)"
            - "(knife and fork)"
            - "(telephone symbol)"
            - "(phone icon)"
            - "(parking icon)"
            - "(wheelchair icon)"
            - "(star symbol)"
            - "(bib gourmand)"
            - "[no visible"
            - "[cannot transcribe"
            - "[omitted"
            - "[unreadable"
          generic_placeholder_patterns:
            - "[icon]"
            - "[symbol]"
            - "[character]"
            - "[unknown]"
            - "[placeholder]"
            - "[?]"
            - "[marker]"
          max_generic_placeholder_count: 3
          max_question_mark_ratio: 0.05

  # ---------------------------------------------------------------------------
  # Client-Side Rate Limits
  # ---------------------------------------------------------------------------
  # Multi-window sliding-log limiter with adaptive backoff. A per-provider
  # limiter throttles synchronous transcription calls to stay under these
  # windows BEFORE hitting the API, smoothing bursts that would otherwise trip
  # provider 429s. Each entry is [max_requests, window_seconds]; add as many
  # windows as you like (per-second / minute / hour). Omit the block entirely
  # for permissive defaults (120/s, 15000/min, 15000/hr) -- effectively
  # transparent for typical workloads. Batch submission/polling never passes
  # through the limiter.
  # Used by: modules/infra/rate_limit.py
  rate_limits:
    - [120, 1]       # up to 120 requests per second
    - [15000, 60]    # up to 15,000 requests per minute
    - [15000, 3600]  # up to 15,000 requests per hour

  # ---------------------------------------------------------------------------
  # Image Pre-Processing Concurrency
  # ---------------------------------------------------------------------------
  # Parallelism for CPU-bound page rendering / preprocessing (PDF rasterization
  # and Tesseract preprocessing), separate from the LLM concurrency above.
  # Used by: modules/documents/pdf.py, modules/images/pipeline.py
  image_processing:
    # Maximum pages preprocessed in parallel (default 4 when absent).
    concurrency_limit: 4

# =============================================================================
# Prompt Caching
# =============================================================================
# Controls provider-specific LLM prompt caching to reduce input token costs
# and latency. The system prompt (instructions + schema + context) is static
# per run -- only image data varies. Caching avoids re-processing the prompt's
# KV cache on every request.
#
# Used by:
#   - modules/llm/providers/*.py (cache_control annotations)
#   - modules/llm/batch/backends/anthropic_backend.py (batch system param)
# =============================================================================

prompt_caching:
  # Master toggle. When false, no caching annotations are added.
  enabled: false

  anthropic:
    # Cache TTL: "5m" (default, free writes) or "1h" (extended, 2x write cost).
    ttl: "5m"

  openai:
    # Optional retention hint: null (default 5-10 min) or "24h" (gpt-5.x, gpt-4.1).
    prompt_cache_retention: 24h

  openrouter:
    # Pass cache_control annotations for Anthropic/Claude models via OpenRouter.
    anthropic_cache_control: true

# =============================================================================
# Daily Token Limit
# =============================================================================
# Tracks cumulative token usage across all LLM API calls and enforces a daily
# cap. When the limit is reached, processing pauses until the daily reset.
# Resets at 00:01 UTC, one minute after OpenAI's free-tier counter reset at
# 00:00 UTC.
#
# Used by:
#   - modules/infra/token_budget.py (usage tracking, limit enforcement, and the
#       async wait-for-reset loop)
#   - modules/transcribe/manager.py, modules/batch/repair.py (drain/wait gate)
# =============================================================================

daily_token_limit:
  # Master toggle. When false, no token tracking or limits are enforced.
  enabled: false

  # Maximum tokens allowed per day (input + output combined).
  # Processing pauses when this limit is reached; resumes at the 00:01 UTC reset.
  # This is the SECONDARY (combined) guard; see `scope` below for what it caps.
  daily_tokens: 10_000_000

  # Scope of the combined `daily_tokens` guard:
  #   pooled (default) -- caps only calls whose model belongs to a defined pool,
  #     plus un-attributed usage; a pool-less bucket (a self-hosted/local
  #     endpoint or any provider without a pool program) is counted but never
  #     blocked by other providers' usage. The per-key pool caps below are then
  #     the primary guard.
  #   all -- legacy block-everything: the combined cap governs every call.
  scope: pooled

  # PRIMARY guard: per-key daily pools. A "pool" is a named set of models that
  # shares one daily token allowance per API key, where a key is identified by
  # the NAME of the env var that serves it (never the key value; e.g.
  # OPENAI_API_KEY_2 counts separately from OPENAI_API_KEY). Built-in pool
  # definitions currently cover OpenAI's complimentary daily token program
  # (`large`/`small`); any provider may define its own pools here.
  #
  # Each `<provider>.<label>` entry is EITHER a bare integer (the cap; the
  # pool's model list comes from the built-ins) OR a mapping with optional
  # `cap` and `models` keys. `models` is a list of model-name prefixes
  # (longest prefix wins, matching only at separator boundaries); defining
  # `models` for a provider REPLACES its built-in pools. A pool without a
  # resolvable cap is tracked but uncapped. Omit this whole block to apply the
  # built-in pools and default caps; set `enabled: false` to disable per-key
  # caps entirely.
  per_key_pool_caps:
    enabled: true
    openai:
      small: 9_750_000            # bare int: cap only, built-in model list
      large:
        cap: 975_000              # mapping form; `models` optional
    # myhost:                     # example: a custom provider with its own pool
    #   standard:
    #     cap: 5_000_000
    #     models: ["my-model"]

  # Cold-start guess (tokens) for one page before any usage is observed this
  # run; a self-calibrating rolling average (EWMA) takes over after the first
  # pages. Higher is more conservative (stops slightly earlier); lower
  # approaches the limit more tightly.
  chunk_estimate_seed: 25_000

  # EWMA smoothing factor (0-1) for the per-call estimate: higher reacts faster
  # to recent calls, lower is steadier.
  estimate_smoothing: 0.3

# =============================================================================
# Shared Cross-Tool Token Budget (opt-in)
# =============================================================================
# Opt-in combined daily token budget shared with the other ChronoPipeline tools
# (ChronoMiner and AutoExcerpter). When enabled, the daily_tokens cap above is
# enforced against the COMBINED usage of every participating tool, tracked in a
# single on-disk ledger (default ~/.chronopipeline/token_ledger.json) under an
# OS file lock. Each tool still reads its own daily_tokens limit; that limit is
# just measured against the shared total instead of this tool's usage alone.
#
# When disabled (the default) behaviour is bit-for-bit the private per-tool
# tracker with zero ledger I/O: usage lives in ~/.chronotranscriber/token_state.json.
# Any I/O trouble with the ledger degrades silently to standalone mode.
#
# Used by:
#   - modules/infra/token_budget.py (ledger seed/sync, combined enforcement)
#   - modules/infra/shared_ledger.py (the vendored cross-tool ledger)
shared_token_budget:
  # Master toggle. false = private per-tool budget (today's behaviour).
  enabled: false

  # Directory holding the shared ledger. Empty means the default
  # ~/.chronopipeline. Point every participating tool at the same directory.
  ledger_dir: ""
