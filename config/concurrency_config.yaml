# =============================================================================
# Concurrency Configuration
# =============================================================================
# Controls parallel processing, API retry behavior, and token usage limits.
#
# Used by:
#   - modules/core/workflow.py (concurrency_limit, delay_between_tasks)
#   - modules/llm/batch/batching.py (service_tier, batch_chunk_size)
#   - modules/llm/providers/*.py (retry.attempts)
#   - modules/core/token_guard.py (daily_token_limit)
# =============================================================================

concurrency:
  transcription:
    # Maximum concurrent LLM API calls during synchronous transcription.
    # Higher values = faster processing but more API load.
    # Recommended: 20-50 for most use cases; up to 1500 for high-throughput scenarios.
    concurrency_limit: 1500

    # Delay (seconds) between starting each transcription task.
    # Helps avoid rate limiting; set to 0 for maximum throughput.
    delay_between_tasks: 0

    # OpenAI service tier for Responses API (synchronous mode only).
    # Values: 'auto', 'default', 'flex', 'priority'
    # Note: 'flex' is synchronous-only; batch processing auto-converts to 'auto'.
    service_tier: flex

    # Number of images per batch file when using OpenAI Batch API.
    # Larger chunks = fewer API calls but larger file uploads.
    batch_chunk_size: 50

    # Request timeout in seconds for each API call.
    # OpenAI's default SDK timeout is 10 minutes; flex processing can exceed this.
    # Set to 900 (15 minutes) as recommended by OpenAI for flex service tier.
    # LangChain will raise APITimeoutError and trigger retry on expiry.
    request_timeout: 900

    # Retry configuration for transient API errors (429, 5xx, timeouts).
    # LangChain handles exponential backoff internally; only 'attempts' is used.
    retry:
      # Maximum retry attempts before failing. LangChain applies exponential backoff.
      attempts: 5

      # Maximum retry attempts for validation/parsing errors (model returns
      # unparseable structured output) AND for transient provider response-shape
      # bugs (TypeError/AttributeError from LangChain internals). Shared budget.
      # Bumped from 3 to 6 after the 2026-04-13 pilot surfaced ~7% of pages
      # failing with "'NoneType' object is not iterable" from OpenRouter.
      validation_attempts: 6

      # Minimum expected input tokens for image requests. Responses below
      # this are treated as cross-contaminated and retried. 0 = disabled.
      min_input_tokens: 500

      # Content quality validators: detect hallucination loops, truncation,
      # system-prompt bleed, and excessive line repetition in transcribed text.
      # Failed pages are retried against the validation_attempts budget.
      # Thresholds are tuned against the 4 known catastrophic Qwen failure
      # modes (de la Playa loop x200, M x100, truncation, schema bleed).
      content_quality:
        enabled: true
        # Repeated substring detection (hallucination loops)
        max_repeated_substring_length: 30   # minimum substring length to check
        max_repeated_substring_count: 15    # trigger threshold (real loops show 100+)
        min_alphanum_in_substring: 15       # substring must have >=N alphanumeric chars
                                            # (filters whitespace/punctuation padding)
        max_single_char_repeat: 75          # e.g., "MMMM..." x75
        # Truncation detection
        min_transcription_length: 50        # chars; content pages below this trigger retry
        # System-prompt bleed detection (checked in first N chars)
        bleed_check_chars: 200
        system_prompt_bleed_patterns:
          - '"type": "object"'
          - '"additionalProperties"'
          - '"transcription_not_possible"'
        # Excessive line repetition (map-label loops)
        max_line_repeat_count: 18
        min_line_length_for_repeat: 10
        # Invalid-transcription-marker detection (added 13 Apr 2026 after
        # Phase D pilot surfaced Qwen drift patterns where the model
        # describes a visible icon instead of transcribing real content).
        # Catches three sub-patterns:
        #   A) Icon-description literals ("!Icon:", "(icon)", "[see image]")
        #   B) Generic-placeholder flooding ("[icon]" used many times)
        #   C) Question-mark clusters (OCR failure)
        invalid_markers:
          enabled: true
          icon_description_literals:
            - "!icon:"
            - "(icon)"
            - "(no icon"
            - "[see image"
            - "[see attached"
            - "[image of"
            - "[image:"
            - "[figure"
            - "[picture"
            - "(building icon)"
            - "(hotel icon)"
            - "(restaurant icon)"
            - "(fork and spoon)"
            - "(knife and fork)"
            - "(telephone symbol)"
            - "(phone icon)"
            - "(parking icon)"
            - "(wheelchair icon)"
            - "(star symbol)"
            - "(bib gourmand)"
            - "[no visible"
            - "[cannot transcribe"
            - "[omitted"
            - "[unreadable"
          generic_placeholder_patterns:
            - "[icon]"
            - "[symbol]"
            - "[character]"
            - "[unknown]"
            - "[placeholder]"
            - "[?]"
            - "[marker]"
          max_generic_placeholder_count: 3
          max_question_mark_ratio: 0.05

# =============================================================================
# Prompt Caching
# =============================================================================
# Controls provider-specific LLM prompt caching to reduce input token costs
# and latency. The system prompt (instructions + schema + context) is static
# per run — only image data varies. Caching avoids re-processing the prompt's
# KV cache on every request.
#
# Anthropic: requires explicit cache_control annotations (50-90% savings).
# OpenAI: automatic prefix-based caching; optional retention extension.
# Google: fully automatic; no configuration needed.
# OpenRouter: pass-through of provider-native caching signals.
#
# Used by:
#   - modules/llm/providers/*.py (cache_control annotations)
#   - modules/llm/batch/backends/anthropic_backend.py (batch system param)
# =============================================================================

prompt_caching:
  # Master toggle. When false, no caching annotations are added.
  enabled: false

  anthropic:
    # Cache TTL: "5m" (default, free writes) or "1h" (extended, 2x write cost).
    ttl: "5m"

  openai:
    # Optional retention hint: null (default 5-10 min) or "24h" (gpt-5.x, gpt-4.1).
    prompt_cache_retention: 24h

  openrouter:
    # Pass cache_control annotations for Anthropic/Claude models via OpenRouter.
    anthropic_cache_control: true

# =============================================================================
# Daily Token Limit
# =============================================================================
# Tracks cumulative token usage across all LLM API calls and enforces a daily
# cap. When the limit is reached, processing pauses until midnight reset.
#
# Used by:
#   - modules/core/token_guard.py (limit enforcement)
#   - modules/infra/token_tracker.py (usage tracking)
#   - modules/core/workflow.py (check before each item)
# =============================================================================

daily_token_limit:
  # Master toggle. When false, no token tracking or limits are enforced.
  enabled: false

  # Maximum tokens allowed per day (input + output combined).
  # Processing pauses when this limit is reached; resumes at midnight.
  # Important: Files started when near the limit will be finished, you will be
  # charged for additional tokens used. If in doubt, set limit lower than
  # your budget.
  daily_tokens: 10_000_000
