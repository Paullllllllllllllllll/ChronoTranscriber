# =============================================================================
# Model Configuration
# =============================================================================
# Configuration for the LLM used by the transcription pipeline.
#
# Used by:
#   - modules/llm/transcriber.py (LangChain-based multi-provider transcription)
#   - modules/llm/providers/*.py (provider-specific implementations)
#   - modules/llm/batch/batching.py (OpenAI Batch API transcription)
#   - modules/config/config_loader.py (model validation at startup)
#
# API Keys (environment variables):
#   - OpenAI: OPENAI_API_KEY
#   - Anthropic: ANTHROPIC_API_KEY
#   - Google: GOOGLE_API_KEY
#   - OpenRouter: OPENROUTER_API_KEY
# =============================================================================

transcription_model:
  provider: openai
  name: gpt-5.4-mini
  max_output_tokens: 128000
  expects_image_inputs: true
  reasoning:
    effort: medium
  text:
    verbosity: medium
  temperature: 1
  top_p: 1.0
  frequency_penalty: 0.01
  presence_penalty: 0.01
  # Text block sent alongside each page image in the user message.
  # Default: "The image:". Set to "" to send image-only input (no text
  # block), required for models like churro-3B (Qwen2.5-VL fine-tune).
  user_instruction: "The image:"
  # Label for the optional context image. Default: "Context image:".
  # Set to "" to omit the label while still sending the context image.
  context_image_instruction: "Context image:"

